services:
  postgres:
    image: postgres:16-alpine
    container_name: biowatchcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biowatchcare_db
      POSTGRES_USER: biowatchcare
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - biowatchcare_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U biowatchcare -d biowatchcare_db']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  biowatchcare_postgres_data:
